name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_type == 'debug'
        run: ./gradlew assembleDebug

      - name: Build Release APK
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release'
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        if: success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.build_type == 'debug')
        uses: actions/upload-artifact@v7
        with:
          name: QR-Inventaris-Debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        if: success() && github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v7
        with:
          name: QR-Inventaris-Release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
